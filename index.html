<!DOCTYPE html>
<html>
<head>
  <title>About Me</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f4f4;
      text-align: center;
      padding: 20px;
    }

    h1 { color: #2c3e50; }
    h2 { color: #16a085; }
    p { font-size: 18px; }

    ul { list-style-type: none; }

    li {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #16a085;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #13856b;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .container {
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

input {
  padding: 10px;
  width: 80%;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  background-color: #16a085;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background-color: #13856b;
}

.patient {
  background: #ecf9f6;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
}
  </style>
</head>

<body>

  <body>

<div class="container">

  <div class="card">
    <h1>ConsultRx 🏥</h1>
    <p>Simple Patient Entry System</p>
  </div>

  <div class="card">
    <h2>Patient Entry</h2>

    <input type="text" id="patientName" placeholder="Patient Name"><br>
    <input type="number" id="age" placeholder="Age"><br>

    <button onclick="addPatient()">Add Patient</button>
  </div>

  <div class="card">
    <h2>Patient List</h2>
    <div id="patientOutput"></div>
  </div>

</div>

</body>
  <!-- Button -->
  <button onclick="showMessage()">Click Me</button>
  <p id="message"></p>

  <!-- Form -->
  <h2>Contact Form</h2>

  <input type="text" id="name" placeholder="Enter your name"><br><br>

  <button onclick="submitForm()">Submit</button>

  <p id="output"></p>
  
  <h2>Patient Entry</h2>

<input type="text" id="patientName" placeholder="Patient Name"><br><br>

<input type="number" id="age" placeholder="Age"><br><br>

<button onclick="addPatient()">Add Patient</button>

<p id="patientOutput"></p>

  <!-- JavaScript (keep at bottom) -->
  <script>
var patients = [];

function addPatient() {
  var name = document.getElementById("patientName").value;
  var age = document.getElementById("age").value;

  var patientText = "Patient: " + name + " | Age: " + age;

  patients.push(patientText);

  var output = "";
  for (var i = 0; i < patients.length; i++) {
    output += "<div class='patient'>" + patients[i] + "</div>";
  }

  document.getElementById("patientOutput").innerHTML = output;
}
  </script>

</body>
</html>
